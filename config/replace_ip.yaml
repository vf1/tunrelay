system:
  ip_forward: true
  masquerade:
    saddr: "10.0.1.1/24"
relays:
  #------------------------
  - ingress:
      type: tun
      name: tun10
      cidr: "10.0.0.2/24"
      peer: "10.0.0.1"
    egress:
      type: udp
      dial: "localhost:4000"
      password: "pass"
  #------------------------
  - ingress:
      type: udp
      listen: "localhost:4000"
      peers:
        - password: "pass"
          saddr: "10.0.0.2"
    middlewares:
      - type: replace_ip
        forward_src: "10.0.1.1/32"
        backward_dst: "10.0.0.2/32"
    egress:
      type: tun
      name: tun11
      cidr: "10.0.1.2/24"
      peer: "10.0.1.1"
