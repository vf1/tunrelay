name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tun-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download wintun.dll (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -L -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          Expand-Archive -Path wintun.zip -DestinationPath .
          Copy-Item wintun\bin\amd64\wintun.dll internal\endpoint\tunep\

      - name: Compile test binary (unix)
        if: runner.os != 'Windows'
        run: go test -c -o /tmp/tunep.test ./internal/endpoint/tunep/

      - name: Run tests (unix)
        if: runner.os != 'Windows'
        run: sudo /tmp/tunep.test -test.v

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: go test -v ./internal/endpoint/tunep/

      - name: Run udp tests
        run: go test -v ./internal/endpoint/udpep/

      - name: Run iptool tests
        run: go test -v ./internal/iptool/

      - name: Run relay tests
        run: go test -v ./internal/relay/
